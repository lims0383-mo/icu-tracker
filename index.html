<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICU 病情追蹤系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#f7f6f2;--surface:#fff;--surface2:#f2f0eb;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --text:#1a1916;--text2:#5a5855;--text3:#9a9893;
  --accent:#1a5fa8;--accent-bg:#e8f0fb;--accent-text:#1a5fa8;
  --success:#2d7a4f;--success-bg:#e6f4ed;--warn:#8a5a00;--warn-bg:#fef3dc;
  --danger:#a02020;--danger-bg:#fdeaea;--radius:10px;--radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1d1a;--surface2:#282724;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --text:#f0ede8;--text2:#a0a09a;--text3:#666660;--accent:#5b9fe0;--accent-bg:#1a2d44;--accent-text:#7db8f0;
  --success:#4daa74;--success-bg:#162a20;--warn:#d4920a;--warn-bg:#2a2000;--danger:#e06060;--danger-bg:#2a1010;
  --shadow:0 1px 4px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.2);
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:0 0 80px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header-icon{width:36px;height:36px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:16px;font-weight:600}
.header-sub{font-size:11px;color:var(--text3)}
.header-sync{margin-left:auto;font-size:11px;color:var(--success);background:var(--success-bg);padding:4px 10px;border-radius:99px;white-space:nowrap}
.nav{display:flex;gap:3px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.nav-btn{flex-shrink:0;padding:7px 13px;border:none;border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--text2);font-weight:500;transition:all .15s}
.nav-btn.active{background:var(--accent-bg);color:var(--accent-text)}
.nav-btn:hover:not(.active){background:var(--surface2)}
.content{padding:18px 14px}
.page{display:none}.page.active{display:block}
.sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:1.4rem 0 .7rem;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.sec span{font-size:14px;text-transform:none;letter-spacing:0}
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:9px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:12px;color:var(--text2);font-weight:500}
.unit{font-size:11px;color:var(--text3);font-weight:400;margin-left:2px}
input[type=number],input[type=text],input[type=date],textarea,select{
  border:1px solid var(--border2);border-radius:var(--radius);padding:8px 10px;
  font-size:14px;font-family:'Noto Sans TC',sans-serif;width:100%;
  background:var(--surface);color:var(--text);transition:border-color .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,95,168,.1)}
textarea{resize:vertical;min-height:68px}
.cb-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cb-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--surface2);padding:6px 10px;border-radius:8px;border:1px solid var(--border)}
.cb-item input{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.btn-save{background:var(--accent);color:#fff;border:none;padding:13px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;width:100%;margin-top:1.5rem;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-save:hover{opacity:.88}
.btn-sm{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:7px 13px;border-radius:var(--radius);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:background .15s}
.btn-sm:hover{background:var(--surface2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:9px}
.metric{background:var(--surface2);border-radius:var(--radius);padding:11px 13px}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:3px}
.metric-val{font-size:21px;font-weight:600;color:var(--text)}
.metric-unit{font-size:11px;color:var(--text3);margin-left:2px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-month{font-size:16px;font-weight:600}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
.cal-wd{font-size:11px;color:var(--text3);padding:4px 0;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2);transition:all .12s;border:1.5px solid transparent}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.has-data{background:var(--accent-bg);color:var(--accent-text);font-weight:600}
.cal-cell.today{border-color:var(--accent)}
.cal-cell.selected{background:var(--accent);color:#fff}
.day-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-top:10px;box-shadow:var(--shadow)}
.det-sec{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.dk{color:var(--text2)}.dv{font-weight:600;color:var(--text)}
.note-block{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.7}
.note-block strong{color:var(--text)}
.upload-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:20px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;transition:all .15s}
.upload-zone:hover{border-color:var(--accent);color:var(--accent-text);background:var(--accent-bg)}
.img-preview{max-width:100%;border-radius:var(--radius);margin-top:8px;border:1px solid var(--border)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);padding:10px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{color:var(--success);border-color:var(--success)}
.toast.err{color:var(--danger);border-color:var(--danger)}
.trend-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.trend-toolbar label{font-size:13px;color:var(--text2)}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow)}
.empty{text-align:center;padding:48px 0;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-msg{font-size:14px}
.stats-row{font-size:14px;color:var(--text2);line-height:2.2}
.stats-row b{color:var(--text);font-weight:600}
.export-btn{margin-top:1rem;background:var(--success-bg);color:var(--success);border:1px solid rgba(45,122,79,.3);padding:10px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
.export-btn:hover{opacity:.8}
.period-bar{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1rem}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">🏥</div>
    <div><div class="header-title">ICU 病情追蹤系統</div><div class="header-sub">每日醫療數據記錄</div></div>
    <div class="header-sync" id="sync-status">⏳ 連線中</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showPage('entry')">✏️ 記錄</button>
    <button class="nav-btn" onclick="showPage('history')">📅 歷史</button>
    <button class="nav-btn" onclick="showPage('trends')">📈 趨勢</button>
    <button class="nav-btn" onclick="showPage('summary')">📊 總覽</button>
  </div>

  <div class="content">

    <!-- 記錄 -->
    <div id="page-entry" class="page active">
      <div class="period-bar">
        <div class="f"><label>記錄日期</label><input type="date" id="entry-date"></div>
        <div class="f"><label>時段</label>
          <select id="entry-period">
            <option value="morning">🌅 早上（06–12點）</option>
            <option value="afternoon">☀️ 下午（12–18點）</option>
            <option value="evening">🌙 晚上（18–24點）</option>
            <option value="night">🌃 深夜（00–06點）</option>
          </select>
        </div>
      </div>

      <!-- 生命監視器 GE -->
      <div class="sec"><span>❤️</span> 生命監視器（GE）</div>
      <div class="grid2">
        <div class="f"><label>血壓收縮壓 <span class="unit">mmHg</span></label><input type="number" id="bp_sys" placeholder="例：95"></div>
        <div class="f"><label>血壓舒張壓 <span class="unit">mmHg</span></label><input type="number" id="bp_dia" placeholder="例：63"></div>
        <div class="f"><label>平均動脈壓 MAP <span class="unit">mmHg</span></label><input type="number" id="bp_map" placeholder="例：76"></div>
        <div class="f"><label>心跳 HR <span class="unit">bpm</span></label><input type="number" id="hr" placeholder="例：87"></div>
        <div class="f"><label>呼吸次數 <span class="unit">/min</span></label><input type="number" id="rr_monitor" placeholder="例：16"></div>
        <div class="f"><label>體溫 <span class="unit">°C</span></label><input type="number" step="0.1" id="temp" placeholder="例：38.0"></div>
        <div class="f"><label>尿量 <span class="unit">mL/24h</span></label><input type="number" id="urine" placeholder="例：1200"></div>
        <div class="f"><label>SpO2（探頭量） <span class="unit">%</span></label><input type="number" id="spo2" placeholder="例：98"></div>
      </div>
      <div class="f" style="margin-top:10px"><label>心律警示（可複選）</label>
        <div class="cb-group">
          <label class="cb-item"><input type="checkbox" id="arrhythmia_pvcs"> MULTIFOC PVCS</label>
          <label class="cb-item"><input type="checkbox" id="arrhythmia_afib"> ATRIAL FIB</label>
          <label class="cb-item"><input type="checkbox" id="arrhythmia_vt"> V-TACH</label>
          <label class="cb-item"><input type="checkbox" id="arrhythmia_none"> 無警示</label>
        </div>
      </div>

      <!-- 呼吸機 Hamilton C3 -->
      <div class="sec"><span>🫁</span> 呼吸機（Hamilton C3）</div>
      <div class="grid2">
        <div class="f"><label>模式</label>
          <select id="vent_mode">
            <option value="">請選擇</option>
            <option value="PCV+">PCV+（壓力控制）</option>
            <option value="VCV">VCV（容積控制）</option>
            <option value="SIMV">SIMV</option>
            <option value="CPAP/PS">CPAP/PS</option>
            <option value="APRV">APRV</option>
          </select>
        </div>
        <div class="f"><label>Oxygen FiO2 <span class="unit">%</span></label><input type="number" id="fio2" placeholder="例：100"></div>
        <div class="f"><label>PEEP/CPAP <span class="unit">cmH₂O</span></label><input type="number" id="peep" placeholder="例：10"></div>
        <div class="f"><label>Pcontrol <span class="unit">cmH₂O</span></label><input type="number" id="pcontrol" placeholder="例：20"></div>
        <div class="f"><label>Ppeak 吸氣峰壓 <span class="unit">cmH₂O</span></label><input type="number" id="ppeak" placeholder="例：30"></div>
        <div class="f"><label>VTE 呼出潮氣量 <span class="unit">mL</span></label><input type="number" id="vte" placeholder="例：81"></div>
        <div class="f"><label>ExpMinVol <span class="unit">L/min</span></label><input type="number" step="0.01" id="expminvol" placeholder="例：1.53"></div>
        <div class="f"><label>fTotal 呼吸頻率 <span class="unit">/min</span></label><input type="number" id="ftotal" placeholder="例：21"></div>
        <div class="f"><label>I:E 比</label><input type="text" id="ie_ratio" placeholder="例：1:2.2"></div>
        <div class="f"><label>Cstat 肺順應性 <span class="unit">mL/cmH₂O</span></label><input type="number" step="0.1" id="cstat" placeholder="例：4.5"></div>
        <div class="f"><label>Rinsp 氣道阻力 <span class="unit">cmH₂O/L/s</span></label><input type="number" id="rinsp" placeholder="例：11"></div>
      </div>

      <!-- ECMO Maquet + Medtronic -->
      <div class="sec"><span>🔴</span> 葉克膜 ECMO（Maquet 幫浦 + Medtronic 氧合）</div>
      <div class="grid2">
        <div class="f"><label>血流量 LPM <span class="unit">L/min</span></label><input type="number" step="0.01" id="ecmo_flow" placeholder="例：3.49"></div>
        <div class="f"><label>轉速 RPM</label><input type="number" id="ecmo_rpm" placeholder="例：3440"></div>
        <div class="f"><label>SvO₂ 混合靜脈血氧 <span class="unit">%</span></label><input type="number" id="ecmo_svo2" placeholder="例：82"></div>
        <div class="f"><label>SaO₂ <span class="unit">%</span></label><input type="number" id="ecmo_sao2" placeholder="例：98"></div>
        <div class="f"><label>Hct（ECMO端） <span class="unit">%</span></label><input type="number" id="ecmo_hct" placeholder="例：26"></div>
        <div class="f"><label>掃氣流量 Sweep <span class="unit">L/min</span></label><input type="number" step="0.1" id="ecmo_sweep" placeholder="例：4.0"></div>
        <div class="f"><label>FdO2 <span class="unit">%</span></label><input type="number" id="ecmo_fdo2" placeholder="例：100"></div>
        <div class="f"><label>ACT 凝血時間 <span class="unit">sec</span></label><input type="number" id="ecmo_act" placeholder="例：180"></div>
        <div class="f"><label>肝素 Heparin <span class="unit">U/h</span></label><input type="number" id="heparin" placeholder="例：800"></div>
      </div>

      <!-- CVVH 連續透析 -->
      <div class="sec"><span>💧</span> CVVH 連續透析機</div>
      <div class="grid2">
        <div class="f"><label>血液流速 <span class="unit">mL/min</span></label><input type="number" id="cvvh_blood" placeholder="例：150"></div>
        <div class="f"><label>超濾流量 <span class="unit">mL/h</span></label><input type="number" id="cvvh_uf" placeholder="例：1000"></div>
        <div class="f"><label>體液減輕目標 <span class="unit">mL/h</span></label><input type="number" id="cvvh_remove" placeholder="例：100"></div>
        <div class="f"><label>體液總變化 <span class="unit">g</span></label><input type="number" id="cvvh_balance" placeholder="例：-2778"></div>
        <div class="f"><label>動脈端壓力 <span class="unit">mmHg</span></label><input type="number" id="cvvh_ap" placeholder="例：-97"></div>
        <div class="f"><label>靜脈端壓力 <span class="unit">mmHg</span></label><input type="number" id="cvvh_vp" placeholder="例：20"></div>
        <div class="f"><label>加溫器溫度 <span class="unit">°C</span></label><input type="number" step="0.1" id="cvvh_temp" placeholder="例：38.0"></div>
        <div class="f"><label>療程執行時間</label><input type="text" id="cvvh_time" placeholder="例：22:46"></div>
      </div>

      <!-- 血液氣體分析 ABG -->
      <div class="sec"><span>🩸</span> 血液氣體分析（ABG）</div>
      <div class="grid3">
        <div class="f"><label>pH</label><input type="number" step="0.001" id="ph" placeholder="例：7.402"></div>
        <div class="f"><label>PCO2 <span class="unit">mmHg</span></label><input type="number" step="0.1" id="pco2" placeholder="例：32.4"></div>
        <div class="f"><label>PO2 <span class="unit">mmHg</span></label><input type="number" step="0.1" id="po2" placeholder="例：97.5"></div>
        <div class="f"><label>HCO3 <span class="unit">mmol/L</span></label><input type="number" step="0.1" id="hco3" placeholder="例：19.7"></div>
        <div class="f"><label>O2 sat <span class="unit">%</span></label><input type="number" step="0.1" id="o2sat" placeholder="例：97.5"></div>
        <div class="f"><label>ABE</label><input type="number" step="0.1" id="abe" placeholder="例：-3.6"></div>
        <div class="f"><label>Lactate 乳酸 <span class="unit">mmol/L</span></label><input type="number" step="0.1" id="lac" placeholder="例：1.8"></div>
        <div class="f"><label>血糖 Glucose <span class="unit">mg/dL</span></label><input type="number" id="glucose" placeholder="例：105"></div>
      </div>

      <!-- 血液常規 CBC -->
      <div class="sec"><span>🧪</span> 血液常規（CBC）</div>
      <div class="grid3">
        <div class="f"><label>WBC <span class="unit">×10³/μL</span></label><input type="number" step="0.01" id="wbc" placeholder="例：17.52"></div>
        <div class="f"><label>RBC <span class="unit">×10⁶/μL</span></label><input type="number" step="0.01" id="rbc" placeholder="例：2.38"></div>
        <div class="f"><label>Hb <span class="unit">g/dL</span></label><input type="number" step="0.1" id="hb" placeholder="例：7.2"></div>
        <div class="f"><label>Hct <span class="unit">%</span></label><input type="number" step="0.1" id="hct" placeholder="例：20.5"></div>
        <div class="f"><label>PLT 血小板 <span class="unit">×10³/μL</span></label><input type="number" id="plt" placeholder="例：51"></div>
        <div class="f"><label>MCH <span class="unit">pg</span></label><input type="number" step="0.1" id="mch" placeholder="例：30.3"></div>
        <div class="f"><label>MCHC <span class="unit">g/dL</span></label><input type="number" step="0.1" id="mchc" placeholder="例：35.1"></div>
        <div class="f"><label>MCV <span class="unit">fL</span></label><input type="number" step="0.1" id="mcv" placeholder="例：86.1"></div>
        <div class="f"><label>RDW-CV <span class="unit">%</span></label><input type="number" step="0.1" id="rdwcv" placeholder="例：16.0"></div>
      </div>

      <!-- 生化 -->
      <div class="sec"><span>⚗️</span> 生化檢驗</div>
      <div class="grid3">
        <div class="f"><label>CRP <span class="unit">mg/dL</span></label><input type="number" step="0.1" id="crp" placeholder="例：8.3"></div>
        <div class="f"><label>PCT <span class="unit">ng/mL</span></label><input type="number" step="0.01" id="pct" placeholder="例：2.1"></div>
        <div class="f"><label>BUN <span class="unit">mg/dL</span></label><input type="number" step="0.1" id="bun" placeholder="例：28.0"></div>
        <div class="f"><label>CRE Creatinine <span class="unit">mg/dL</span></label><input type="number" step="0.01" id="cr" placeholder="例：1.5"></div>
        <div class="f"><label>eGFR <span class="unit">mL/min</span></label><input type="number" step="0.01" id="egfr" placeholder="例：41.98"></div>
        <div class="f"><label>GOT/AST <span class="unit">U/L</span></label><input type="number" id="ast" placeholder="例：46"></div>
        <div class="f"><label>GPT/ALT <span class="unit">U/L</span></label><input type="number" id="alt" placeholder="例：38"></div>
        <div class="f"><label>TBI 總膽紅素 <span class="unit">mg/dL</span></label><input type="number" step="0.01" id="tbi" placeholder="例：1.82"></div>
        <div class="f"><label>Albumin <span class="unit">g/dL</span></label><input type="number" step="0.1" id="alb" placeholder="例：3.2"></div>
      </div>

      <!-- 電解質 -->
      <div class="sec"><span>⚡</span> 電解質</div>
      <div class="grid3">
        <div class="f"><label>Na <span class="unit">mEq/L</span></label><input type="number" step="0.1" id="na" placeholder="例：134"></div>
        <div class="f"><label>K <span class="unit">mEq/L</span></label><input type="number" step="0.1" id="k" placeholder="例：3.9"></div>
        <div class="f"><label>Ca <span class="unit">mg/dL</span></label><input type="number" step="0.01" id="ca" placeholder="例：2.34"></div>
        <div class="f"><label>Mg <span class="unit">mg/dL</span></label><input type="number" step="0.1" id="mg" placeholder="例：2.4"></div>
        <div class="f"><label>Cl <span class="unit">mEq/L</span></label><input type="number" step="0.1" id="cl" placeholder="例：102"></div>
        <div class="f"><label>P 磷 <span class="unit">mg/dL</span></label><input type="number" step="0.1" id="phos" placeholder="例：3.5"></div>
      </div>

      <!-- X光 -->
      <div class="sec"><span>🩻</span> X 光結果</div>
      <div class="f" style="margin-bottom:10px"><label>X 光觀察紀錄</label>
        <textarea id="xray_note" placeholder="例：雙側肺浸潤較昨日改善，右側少量積液仍存在..."></textarea>
      </div>
      <div class="upload-zone" onclick="document.getElementById('xray-upload').click()">
        📷 點擊上傳 X 光影像（選填）
        <input type="file" id="xray-upload" style="display:none" accept="image/*" onchange="previewImg(this,'xray-preview','xray-b64')">
      </div>
      <img id="xray-preview" class="img-preview" style="display:none">
      <input type="hidden" id="xray-b64">

      <!-- 藥物 -->
      <div class="sec"><span>💊</span> 藥物</div>
      <div class="grid2">
        <div class="f"><label>鎮定劑 <span class="unit">mg/h</span></label><input type="number" step="0.1" id="sed_dose" placeholder="例：5.0"></div>
        <div class="f"><label>肌肉鬆弛劑 <span class="unit">mg/h</span></label><input type="number" step="0.1" id="nmb_dose" placeholder="例：10"></div>
        <div class="f"><label>升壓劑（Norepinephrine等） <span class="unit">mcg/kg/min</span></label><input type="number" step="0.001" id="vaso" placeholder="例：0.05"></div>
        <div class="f"><label>抗生素名稱</label><input type="text" id="abx" placeholder="例：Meropenem"></div>
        <div class="f"><label>類固醇</label><input type="text" id="steroid" placeholder="例：Methylprednisolone 40mg"></div>
        <div class="f"><label>其他藥物</label><input type="text" id="other_med" placeholder="例：Furosemide"></div>
      </div>

      <!-- 備註 -->
      <div class="sec"><span>📝</span> 備註</div>
      <div class="f">
        <label>今日整體觀察與醫師說明</label>
        <textarea id="daily_note" placeholder="今日病況整體變化、醫師說明重點、家屬觀察、特殊事件..."></textarea>
      </div>

      <button class="btn-save" onclick="saveEntry()">☁️ 儲存並同步到雲端</button>
    </div>

    <!-- 歷史 -->
    <div id="page-history" class="page">
      <div class="card">
        <div class="cal-header">
          <div class="cal-month" id="cal-month-label"></div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm" onclick="changeMonth(-1)">‹</button>
            <button class="btn-sm" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <div class="cal-wd">日</div><div class="cal-wd">一</div><div class="cal-wd">二</div>
          <div class="cal-wd">三</div><div class="cal-wd">四</div><div class="cal-wd">五</div><div class="cal-wd">六</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div id="selected-day-detail"></div>
    </div>

    <!-- 趨勢 -->
    <div id="page-trends" class="page">
      <div class="trend-toolbar">
        <label>選擇指標：</label>
        <select id="trend-metric" onchange="renderTrend()">
          <option value="hr">心跳 HR</option>
          <option value="bp_map">平均動脈壓 MAP</option>
          <option value="spo2">SpO2</option>
          <option value="temp">體溫</option>
          <option value="fio2">FiO2</option>
          <option value="peep">PEEP</option>
          <option value="vte">VTE 潮氣量</option>
          <option value="ecmo_flow">ECMO 流量</option>
          <option value="ecmo_svo2">SvO₂</option>
          <option value="ecmo_rpm">ECMO 轉速</option>
          <option value="ph">pH</option>
          <option value="pco2">PCO2</option>
          <option value="lac">乳酸</option>
          <option value="crp">CRP</option>
          <option value="wbc">WBC</option>
          <option value="hb">Hb 血紅素</option>
          <option value="plt">血小板 PLT</option>
          <option value="cr">Creatinine</option>
          <option value="na">Na</option>
          <option value="k">K</option>
          <option value="cvvh_balance">CVVH 體液變化</option>
        </select>
      </div>
      <div class="chart-box"><div style="position:relative;height:280px"><canvas id="trend-chart"></canvas></div></div>
      <div id="trend-empty" class="empty" style="display:none">
        <div class="empty-icon">📈</div>
        <div class="empty-msg">尚無足夠數據<br><span style="font-size:12px">請先記錄至少 2 天數據</span></div>
      </div>
    </div>

    <!-- 總覽 -->
    <div id="page-summary" class="page">
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">最近一筆記錄數值</div>
      <div class="metric-grid" id="summary-cards"></div>
      <div class="sec" style="margin-top:1.5rem"><span>📊</span> 統計資訊</div>
      <div class="stats-row" id="stats-text"></div>
      <button class="export-btn" onclick="exportJSON()">⬇️ 匯出所有資料（JSON）</button>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const firebaseConfig = { databaseURL: "https://icu-tracker-77c92-default-rtdb.asia-southeast1.firebasedatabase.app" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const dbRef = db.ref('records');

let records = [], calYear, calMonth, trendChart = null, selectedDate = null;
const periodLabel = { morning:'早上', afternoon:'下午', evening:'晚上', night:'深夜' };
const periodIcon  = { morning:'🌅', afternoon:'☀️', evening:'🌙', night:'🌃' };

function toDateStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function numVal(id){ const v=parseFloat(document.getElementById(id).value); return isNaN(v)?null:v; }
function strVal(id){ return document.getElementById(id).value.trim()||null; }
function chkVal(id){ return document.getElementById(id).checked; }

function loadData(){
  const today=new Date(); calYear=today.getFullYear(); calMonth=today.getMonth();
  document.getElementById('entry-date').value=toDateStr(today);
  document.getElementById('sync-status').textContent='⏳ 連線中...';
  dbRef.on('value', snap=>{
    const data=snap.val();
    records=data?Object.values(data):[];
    records.sort((a,b)=>a.date.localeCompare(b.date));
    document.getElementById('sync-status').textContent='☁️ 雲端同步';
    renderCal(); renderSummary();
  }, ()=>{ document.getElementById('sync-status').textContent='❌ 連線失敗'; showToast('雲端連線失敗','err'); });
}

function saveEntry(){
  const date=document.getElementById('entry-date').value;
  const period=document.getElementById('entry-period').value;
  if(!date){ showToast('請選擇日期','err'); return; }
  const d={
    date, period, periodLabel:periodLabel[period],
    bp_sys:numVal('bp_sys'), bp_dia:numVal('bp_dia'), bp_map:numVal('bp_map'),
    hr:numVal('hr'), rr_monitor:numVal('rr_monitor'), temp:numVal('temp'), urine:numVal('urine'), spo2:numVal('spo2'),
    arrhythmia_pvcs:chkVal('arrhythmia_pvcs'), arrhythmia_afib:chkVal('arrhythmia_afib'),
    arrhythmia_vt:chkVal('arrhythmia_vt'), arrhythmia_none:chkVal('arrhythmia_none'),
    vent_mode:strVal('vent_mode'), fio2:numVal('fio2'), peep:numVal('peep'), pcontrol:numVal('pcontrol'),
    ppeak:numVal('ppeak'), vte:numVal('vte'), expminvol:numVal('expminvol'),
    ftotal:numVal('ftotal'), ie_ratio:strVal('ie_ratio'), cstat:numVal('cstat'), rinsp:numVal('rinsp'),
    ecmo_flow:numVal('ecmo_flow'), ecmo_rpm:numVal('ecmo_rpm'), ecmo_svo2:numVal('ecmo_svo2'),
    ecmo_sao2:numVal('ecmo_sao2'), ecmo_hct:numVal('ecmo_hct'), ecmo_sweep:numVal('ecmo_sweep'),
    ecmo_fdo2:numVal('ecmo_fdo2'), ecmo_act:numVal('ecmo_act'), heparin:numVal('heparin'),
    cvvh_blood:numVal('cvvh_blood'), cvvh_uf:numVal('cvvh_uf'), cvvh_remove:numVal('cvvh_remove'),
    cvvh_balance:numVal('cvvh_balance'), cvvh_ap:numVal('cvvh_ap'), cvvh_vp:numVal('cvvh_vp'),
    cvvh_temp:numVal('cvvh_temp'), cvvh_time:strVal('cvvh_time'),
    ph:numVal('ph'), pco2:numVal('pco2'), po2:numVal('po2'), hco3:numVal('hco3'),
    o2sat:numVal('o2sat'), abe:numVal('abe'), lac:numVal('lac'), glucose:numVal('glucose'),
    wbc:numVal('wbc'), rbc:numVal('rbc'), hb:numVal('hb'), hct:numVal('hct'),
    plt:numVal('plt'), mch:numVal('mch'), mchc:numVal('mchc'), mcv:numVal('mcv'), rdwcv:numVal('rdwcv'),
    crp:numVal('crp'), pct:numVal('pct'), bun:numVal('bun'), cr:numVal('cr'),
    egfr:numVal('egfr'), ast:numVal('ast'), alt:numVal('alt'), tbi:numVal('tbi'), alb:numVal('alb'),
    na:numVal('na'), k:numVal('k'), ca:numVal('ca'), mg:numVal('mg'), cl:numVal('cl'), phos:numVal('phos'),
    xray_note:strVal('xray_note'), xray_img:document.getElementById('xray-b64').value||null,
    sed_dose:numVal('sed_dose'), nmb_dose:numVal('nmb_dose'), vaso:numVal('vaso'),
    abx:strVal('abx'), steroid:strVal('steroid'), other_med:strVal('other_med'),
    daily_note:strVal('daily_note')
  };
  const key=date.replace(/-/g,'')+'_'+period;
  dbRef.child(key).set(d)
    .then(()=>{ showToast('✓ 已同步到雲端','ok'); })
    .catch(()=>{ showToast('儲存失敗，請檢查網路','err'); });
}

function showToast(msg,type){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(type||'ok'); clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2500); }

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  ['entry','history','trends','summary'].forEach((p,i)=>{ if(p===name) document.querySelectorAll('.nav-btn')[i].classList.add('active'); });
  if(name==='trends') setTimeout(renderTrend,60);
  if(name==='summary') renderSummary();
  if(name==='history') renderCal();
}

function renderCal(){
  const grid=document.getElementById('cal-grid'); const label=document.getElementById('cal-month-label'); if(!grid)return;
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  label.textContent=calYear+' 年 '+mn[calMonth];
  const first=new Date(calYear,calMonth,1).getDay(); const days=new Date(calYear,calMonth+1,0).getDate(); const today=toDateStr(new Date());
  let html=''; for(let i=0;i<first;i++) html+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has=records.some(r=>r.date===ds); const isTod=ds===today; const isSel=ds===selectedDate;
    let cls='cal-cell'; if(isSel)cls+=' selected'; else if(has)cls+=' has-data'; if(isTod)cls+=' today';
    html+=`<div class="${cls}" onclick="showDayDetail('${ds}')">${d}</div>`;
  }
  grid.innerHTML=html;
}

function changeMonth(dir){ calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

function showDayDetail(ds){
  selectedDate=ds; renderCal();
  const dayRecs=records.filter(r=>r.date===ds).sort((a,b)=>{const o={morning:0,afternoon:1,evening:2,night:3};return(o[a.period]||0)-(o[b.period]||0);});
  const el=document.getElementById('selected-day-detail');
  if(!dayRecs.length){ el.innerHTML=`<div style="text-align:center;color:var(--text3);font-size:13px;padding:16px">此日無記錄</div>`; return; }
  el.innerHTML=dayRecs.map(rec=>{
    const sec=(title,rows)=>{
      const filtered=rows.filter(r=>r[1]!=null&&r[1]!==false&&r[1]!=='');
      if(!filtered.length)return '';
      return `<div class="det-sec">${title}</div>`+filtered.map(([k,v])=>`<div class="detail-row"><span class="dk">${k}</span><span class="dv">${v}</span></div>`).join('');
    };
    const arr=[];
    if(rec.arrhythmia_pvcs)arr.push('PVCS');
    if(rec.arrhythmia_afib)arr.push('AFIB');
    if(rec.arrhythmia_vt)arr.push('V-TACH');
    if(rec.arrhythmia_none)arr.push('無警示');
    return `<div class="day-detail" style="margin-bottom:10px">
      <div style="font-size:15px;font-weight:600;margin-bottom:10px">${periodIcon[rec.period]||'📋'} ${ds} ${rec.periodLabel||''}</div>
      ${sec('❤️ 生命徵象',[
        ['血壓',rec.bp_sys&&rec.bp_dia?`${rec.bp_sys}/${rec.bp_dia} mmHg`:null],
        ['MAP',rec.bp_map?rec.bp_map+' mmHg':null],['心跳',rec.hr?rec.hr+' bpm':null],
        ['體溫',rec.temp?rec.temp+' °C':null],['SpO2',rec.spo2?rec.spo2+' %':null],
        ['尿量',rec.urine?rec.urine+' mL':null],['心律警示',arr.length?arr.join('、'):null]
      ])}
      ${sec('🫁 呼吸機',[
        ['模式',rec.vent_mode],['FiO2',rec.fio2?rec.fio2+' %':null],['PEEP',rec.peep?rec.peep+' cmH₂O':null],
        ['Pcontrol',rec.pcontrol?rec.pcontrol+' cmH₂O':null],['Ppeak',rec.ppeak?rec.ppeak+' cmH₂O':null],
        ['VTE',rec.vte?rec.vte+' mL':null],['fTotal',rec.ftotal?rec.ftotal+' /min':null],['I:E',rec.ie_ratio]
      ])}
      ${sec('🔴 ECMO',[
        ['血流量',rec.ecmo_flow?rec.ecmo_flow+' L/min':null],['轉速',rec.ecmo_rpm?rec.ecmo_rpm+' RPM':null],
        ['SvO₂',rec.ecmo_svo2?rec.ecmo_svo2+' %':null],['SaO₂',rec.ecmo_sao2?rec.ecmo_sao2+' %':null],
        ['Hct',rec.ecmo_hct?rec.ecmo_hct+' %':null],['ACT',rec.ecmo_act?rec.ecmo_act+' sec':null]
      ])}
      ${sec('💧 CVVH',[
        ['血流速',rec.cvvh_blood?rec.cvvh_blood+' mL/min':null],['超濾量',rec.cvvh_uf?rec.cvvh_uf+' mL/h':null],
        ['體液變化',rec.cvvh_balance!=null?rec.cvvh_balance+' g':null]
      ])}
      ${sec('🩸 ABG',[
        ['pH',rec.ph],['PCO2',rec.pco2?rec.pco2+' mmHg':null],['PO2',rec.po2?rec.po2+' mmHg':null],
        ['HCO3',rec.hco3?rec.hco3+' mmol/L':null],['乳酸',rec.lac?rec.lac+' mmol/L':null],
        ['血糖',rec.glucose?rec.glucose+' mg/dL':null]
      ])}
      ${sec('🧪 CBC/生化',[
        ['WBC',rec.wbc?rec.wbc+' ×10³/μL':null],['Hb',rec.hb?rec.hb+' g/dL':null],
        ['PLT',rec.plt?rec.plt+' ×10³/μL':null],['CRP',rec.crp?rec.crp+' mg/dL':null],
        ['CRE',rec.cr?rec.cr+' mg/dL':null],['Na/K',rec.na&&rec.k?`${rec.na}/${rec.k}`:null]
      ])}
      ${sec('💊 藥物',[['抗生素',rec.abx],['升壓劑',rec.vaso?rec.vaso+' mcg/kg/min':null],['鎮定劑',rec.sed_dose?rec.sed_dose+' mg/h':null]])}
      ${rec.xray_note?`<div class="note-block"><strong>🩻 X光：</strong>${rec.xray_note}</div>`:''}
      ${rec.xray_img?`<img src="${rec.xray_img}" class="img-preview">`:''}
      ${rec.daily_note?`<div class="note-block"><strong>📝 備註：</strong>${rec.daily_note}</div>`:''}
    </div>`;
  }).join('');
}

const metricMeta={
  hr:{label:'心跳',unit:'bpm',color:'#E24B4A'},bp_map:{label:'MAP',unit:'mmHg',color:'#D85A30'},
  spo2:{label:'SpO2',unit:'%',color:'#1D9E75'},temp:{label:'體溫',unit:'°C',color:'#EF9F27'},
  fio2:{label:'FiO2',unit:'%',color:'#378ADD'},peep:{label:'PEEP',unit:'cmH₂O',color:'#7F77DD'},
  vte:{label:'VTE',unit:'mL',color:'#5588AA'},ecmo_flow:{label:'ECMO流量',unit:'L/min',color:'#5DCAA5'},
  ecmo_svo2:{label:'SvO₂',unit:'%',color:'#4DAACC'},ecmo_rpm:{label:'ECMO轉速',unit:'RPM',color:'#88AADD'},
  ph:{label:'pH',unit:'',color:'#9966CC'},pco2:{label:'PCO2',unit:'mmHg',color:'#CC7722'},
  lac:{label:'乳酸',unit:'mmol/L',color:'#D4537E'},crp:{label:'CRP',unit:'mg/dL',color:'#D85A30'},
  wbc:{label:'WBC',unit:'×10³/μL',color:'#BA7517'},hb:{label:'Hb',unit:'g/dL',color:'#8855AA'},
  plt:{label:'PLT',unit:'×10³/μL',color:'#CC4444'},cr:{label:'Creatinine',unit:'mg/dL',color:'#666688'},
  na:{label:'Na',unit:'mEq/L',color:'#448844'},k:{label:'K',unit:'mEq/L',color:'#884488'},
  cvvh_balance:{label:'CVVH體液變化',unit:'g',color:'#4488AA'}
};

function renderTrend(){
  const metric=document.getElementById('trend-metric').value; const meta=metricMeta[metric];
  const pts=records.filter(r=>r[metric]!=null).map(r=>({x:r.date.slice(5)+'('+( periodIcon[r.period]||''),y:r[metric]}));
  const empty=document.getElementById('trend-empty'); const canvas=document.getElementById('trend-chart');
  if(pts.length<2){canvas.style.display='none';empty.style.display='block';return;}
  canvas.style.display='block';empty.style.display='none';
  if(trendChart){trendChart.destroy();trendChart=null;}
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const gc=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'; const tc=isDark?'#a0a09a':'#5a5855';
  trendChart=new Chart(canvas,{type:'line',data:{labels:pts.map(p=>p.x),datasets:[{label:meta.label+(meta.unit?'('+meta.unit+')':''),data:pts.map(p=>p.y),borderColor:meta.color,backgroundColor:meta.color+'20',fill:true,tension:.35,pointRadius:5,pointBackgroundColor:meta.color,pointBorderColor:'#fff',pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11},maxRotation:45}},y:{grid:{color:gc},ticks:{color:tc,font:{size:12}}}}}});
}

function renderSummary(){
  const cards=document.getElementById('summary-cards'); const stats=document.getElementById('stats-text');
  if(!records.length){ cards.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📋</div><div class="empty-msg">尚無記錄</div></div>'; stats.textContent='尚無數據'; return; }
  const last=records[records.length-1];
  const items=[
    ['心跳',last.hr,'bpm'],['MAP',last.bp_map,'mmHg'],['SpO2',last.spo2,'%'],['體溫',last.temp,'°C'],
    ['FiO2',last.fio2,'%'],['PEEP',last.peep,'cmH₂O'],['ECMO流量',last.ecmo_flow,'L/min'],
    ['SvO₂',last.ecmo_svo2,'%'],['乳酸',last.lac,'mmol/L'],['pH',last.ph,''],
    ['WBC',last.wbc,'×10³/μL'],['Hb',last.hb,'g/dL'],['PLT',last.plt,'×10³/μL'],
    ['CRE',last.cr,'mg/dL'],['CRP',last.crp,'mg/dL'],
    ['血壓',last.bp_sys&&last.bp_dia?`${last.bp_sys}/${last.bp_dia}`:null,'mmHg']
  ].filter(i=>i[1]!=null);
  cards.innerHTML=items.length?items.map(([l,v,u])=>`<div class="metric"><div class="metric-label">${l}</div><div><span class="metric-val">${v}</span><span class="metric-unit">${u}</span></div></div>`).join(''):'<div class="empty" style="grid-column:1/-1"><div class="empty-msg">最新記錄無數值</div></div>';
  const first=records[0].date; const latest=records[records.length-1].date;
  const diff=Math.round((new Date(latest)-new Date(first))/86400000)+1;
  stats.innerHTML=`共記錄 <b>${records.length}</b> 筆 &nbsp;·&nbsp; 首筆 <b>${first}</b> &nbsp;·&nbsp; 最近 <b>${latest}</b> &nbsp;·&nbsp; 追蹤天數 <b>${diff}</b> 天`;
}

function exportJSON(){
  const blob=new Blob([JSON.stringify(records,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='icu_records_'+toDateStr(new Date())+'.json'; a.click(); URL.revokeObjectURL(url);
  showToast('✓ 資料已匯出','ok');
}

function previewImg(input,previewId,b64Id){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{ document.getElementById(previewId).src=e.target.result; document.getElementById(previewId).style.display='block'; document.getElementById(b64Id).value=e.target.result; };
  r.readAsDataURL(f);
}

loadData();
</script>
</body>
</html>
